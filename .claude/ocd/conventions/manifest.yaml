settings:
  lines_warn_threshold: 500
  lines_fail_threshold: 2000

conventions:
  .claude/rules/ocd-agent-authoring.md:
    pattern: "*"
    dependencies: []
  .claude/ocd/conventions/cli.md:
    pattern: "*_cli.*"
    dependencies: [.claude/rules/ocd-agent-authoring.md]
  .claude/ocd/conventions/claude-md.md:
    pattern: "CLAUDE.md"
    dependencies: [.claude/rules/ocd-agent-authoring.md]
  .claude/ocd/conventions/skill-md.md:
    pattern: "SKILL.md"
    dependencies: [.claude/rules/ocd-agent-authoring.md]
  .claude/ocd/conventions/python.md:
    pattern: "*.py"
    dependencies: [.claude/rules/ocd-agent-authoring.md]
  .claude/ocd/conventions/skill-init-py.md:
    pattern: "_init.py"
    dependencies: [.claude/rules/ocd-agent-authoring.md, .claude/ocd/conventions/python.md]
  .claude/ocd/conventions/testing.md:
    pattern: "test_*.*|*_test.*|conftest.*"
    dependencies: [.claude/rules/ocd-agent-authoring.md]
