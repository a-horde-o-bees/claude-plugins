settings:
  lines_warn_threshold: 500
  lines_fail_threshold: 2000

conventions:
  .claude/rules/ocd-design-principles.md:
    pattern: "*"
    dependencies: []
  .claude/rules/ocd-communication.md:
    pattern: "*"
    dependencies: [.claude/rules/ocd-design-principles.md]
  .claude/rules/ocd-workflow.md:
    pattern: "*"
    dependencies: [.claude/rules/ocd-design-principles.md]
  .claude/rules/ocd-process-flow-notation.md:
    pattern: "*"
    dependencies: [.claude/rules/ocd-design-principles.md]
  .claude/ocd/conventions/python.md:
    pattern: "*.py"
    dependencies: [.claude/rules/ocd-design-principles.md]
  .claude/ocd/conventions/testing.md:
    pattern: "test_*.*|*_test.*|conftest.*"
    dependencies: [.claude/rules/ocd-design-principles.md]
  .claude/ocd/conventions/skill-md.md:
    pattern: "SKILL.md"
    dependencies: [.claude/rules/ocd-design-principles.md, .claude/rules/ocd-process-flow-notation.md]
  .claude/ocd/conventions/mcp-relational.md:
    pattern: "servers/*.py"
    dependencies: [.claude/rules/ocd-design-principles.md, .claude/ocd/conventions/python.md]
  .claude/ocd/conventions/skill-init-py.md:
    pattern: "_init.py"
    dependencies: [.claude/rules/ocd-design-principles.md, .claude/ocd/conventions/python.md]
