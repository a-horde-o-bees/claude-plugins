name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CLAUDE_HOME: ${{ github.workspace }}/.ci-claude-home

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG must match vX.Y.Z"
            exit 1
          fi

      - name: Verify plugin.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          pj_version=$(python3 -c 'import json; print(json.load(open("plugins/ocd/.claude-plugin/plugin.json"))["version"])')
          if [ "$version" != "$pj_version" ]; then
            echo "::error::Tag version ($version) does not match plugin.json version ($pj_version)"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync project venv
        run: uv sync --group dev

      - name: Bootstrap ocd plugin venv
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/ocd
          CLAUDE_PLUGIN_DATA: ${{ github.workspace }}/.ci-claude-home/plugins/data/ocd-ci
        run: |
          mkdir -p "$CLAUDE_PLUGIN_DATA"
          bash plugins/ocd/hooks/install_deps.sh

      - name: Run tests
        run: bin/project-run tests

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes
