name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  CLAUDE_HOME: ${{ github.workspace }}/.ci-claude-home

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG must match vX.Y.Z"
            exit 1
          fi

      - name: Verify plugin.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          pj_version=$(python3 -c 'import json; print(json.load(open("plugins/ocd/.claude-plugin/plugin.json"))["version"])')
          if [ "$version" != "$pj_version" ]; then
            echo "::error::Tag version ($version) does not match plugin.json version ($pj_version)"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync project venv
        run: uv sync --group dev

      - name: Run project tests
        run: bin/project-run tests --project

      - name: Run skill-authoring tests
        run: bin/project-run tests --plugin skill-authoring

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes
