name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLAUDE_HOME: ${{ github.workspace }}/.ci-claude-home

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync project venv
        run: uv sync --group dev

      - name: Run project tests
        run: bin/project-run tests --project

      - name: Run skill-authoring tests
        run: bin/project-run tests --plugin skill-authoring
