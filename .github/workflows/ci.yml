name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLAUDE_HOME: ${{ github.workspace }}/.ci-claude-home

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Sync project venv
        run: uv sync --group dev

      - name: Run project tests
        run: bin/project-run tests --project

      - name: Run skill-authoring tests
        run: bin/project-run tests --plugin skill-authoring

      - name: Run git tests
        run: bin/project-run tests --plugin git
