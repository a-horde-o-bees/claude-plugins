name: validate

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'plugins/*/.claude-plugin/**'
      - 'scripts/validate.py'
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'plugins/*/.claude-plugin/**'
      - 'scripts/validate.py'

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate marketplace and plugin manifests
        run: python3 scripts/validate.py
