name: test

on:
  pull_request:
  push:
    branches: [main, 'release/*']

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/ocd
      CLAUDE_PLUGIN_DATA: ${{ github.workspace }}/.ci/ocd-data
      CLAUDE_PROJECT_DIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Create project venv (for project-level tests)
        run: |
          uv venv --seed .venv --quiet
          .venv/bin/pip install -q pytest
      - name: Bootstrap plugin venv (mirrors SessionStart install_deps.sh)
        run: |
          mkdir -p "$CLAUDE_PLUGIN_DATA"
          bash "$CLAUDE_PLUGIN_ROOT/hooks/install_deps.sh"
      - name: Expose ocd-run on PATH
        run: echo "$CLAUDE_PLUGIN_ROOT/bin" >> "$GITHUB_PATH"
      - name: Run test suite
        run: bash scripts/test.sh
