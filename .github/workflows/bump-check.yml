name: Bump check

# Enforce the in-PR plugin-version bump: a PR that changes plugin code must
# increment that plugin's patch version, so merge yields one `main` commit
# carrying change + bump (the /checkpoint deployment signal). Replaces the
# retired server-side auto-bump.yml. Make this a required status check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bump-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Check plugin version bumps
        run: python3 scripts/bump-check.py "origin/${{ github.base_ref }}"
