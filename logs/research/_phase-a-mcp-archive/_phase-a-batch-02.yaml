section_observations:
  - subject: mcp
    section: Identification
    samples_in_batch: 5
    sub_purposes_seen:
      url: 5
      stars: 5
      last-commit: 5
      license: 5
      default branch: 5
      one-line purpose: 5
    shape: closed-set
    common_description: |
      Identifies the upstream repo with provenance metadata (URL, stars, last-commit, license, default branch) and a one-line purpose statement summarizing what the server does. Stable vocabulary across samples.
    outliers:
      - sample: Azure--azure-mcp.md
        why: archived repo — `last-commit` carries archival narrative rather than a date; `one-line purpose` is "TBD"
    issues:
      - "`last-commit` field name varied in source (`last-commit (date or relative)`); normalized to canonical `last-commit`"

  - subject: mcp
    section: 1. Language and runtime
    samples_in_batch: 5
    sub_purposes_seen:
      "language(s) + version constraints": 5
      "framework/SDK in use": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Captures the primary language(s) and any version constraints, plus the MCP framework or SDK variant in use (raw `mcp` SDK, FastMCP 1.x/2.x, language-specific SDKs). Pitfalls slot rarely populated.
    issues:
      - "`pitfalls observed` is `none noted in this repo` in 4 of 5 samples — consider folding into the section's primary content or making it conditional"

  - subject: mcp
    section: 2. Transport
    samples_in_batch: 5
    sub_purposes_seen:
      "supported transports": 5
      "how selected": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Records which MCP transports the server supports (stdio, SSE, Streamable HTTP, custom) and the mechanism used to select among them (CLI flag, env var, separate entry point, default-only). Most servers default to stdio; multi-transport support varies.
    outliers:
      - sample: Azure--azure-mcp.md
        why: not extracted — archived
      - sample: DaInfernalCoder--perplexity-mcp.md
        why: transport selection inferred from SDK use, not documented
    issues:
      - "`how selected` parenthetical examples in source labels were stripped to canonical short form"

  - subject: mcp
    section: 3. Distribution
    samples_in_batch: 5
    sub_purposes_seen:
      "every mechanism observed": 5
      "published package name(s)": 5
      "install commands shown in README": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Enumerates how end users obtain the server (PyPI, npm, uvx, npx, Docker, source clone, install-from-git, Smithery), the published package names where applicable, and the README's recommended install commands. Pitfalls slot occasionally records design observations rather than warnings.
    outliers:
      - sample: DiversioTeam--clickup-mcp.md
        why: install-from-git via uvx; no PyPI publication; pitfalls slot used to flag distribution-pattern observations
    issues:
      - "`pitfalls observed` is sometimes used as an observation slot for the section's content (DiversioTeam, DaInfernalCoder, Azure) rather than for actual pitfalls — vocabulary mismatch with the field name"

  - subject: mcp
    section: 4. Entry point / launch
    samples_in_batch: 5
    sub_purposes_seen:
      "command(s) users/hosts run": 5
      "wrapper scripts, launchers, stubs": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Captures the launch command users or hosts invoke (console script, npx, uvx, bare `python main.py`, etc.) and any wrapper scripts, launchers, or stubs (Dockerfiles, dev-compose files, console-script entry points). Pitfalls rarely populated.

  - subject: mcp
    section: 5. Configuration surface
    samples_in_batch: 5
    sub_purposes_seen:
      "how config reaches the server": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Describes how runtime configuration reaches the server — env vars, CLI args, `.env` files, OS-native config dirs (`platformdirs`), persistent state, FastMCP config files. Three distinct credential-storage conventions surface across the batch (env vars, `.env`, OS config dir).
    outliers:
      - sample: DiversioTeam--clickup-mcp.md
        why: uses `platformdirs`-based persistent config rather than the more common env-var pattern
    issues:
      - "Source labels carried parenthetical example lists (`env vars, CLI args, config file w/ path + format, ...`); stripped to canonical short label"

  - subject: mcp
    section: 6. Authentication
    samples_in_batch: 5
    sub_purposes_seen:
      "flow": 5
      "where credentials come from": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Captures the auth flow (static API key, bearer token, none, OAuth, transport-conditional) and where credentials are sourced (env var, CLI arg, config file, persistent store, host-passed params). Most batch entries are static API keys; ClickHouse is transport-conditional (none on stdio, bearer token on HTTP/SSE).

  - subject: mcp
    section: 7. Multi-tenancy
    samples_in_batch: 5
    sub_purposes_seen:
      "tenancy model": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Describes the tenancy model — single-user, per-request tenant, workspace-keyed, not applicable. Most servers are implicitly single-user (single API key per deployment); ClickHouse is the standout with per-request connection overrides via middleware.
    outliers:
      - sample: ClickHouse--mcp-clickhouse.md
        why: per-request tenancy via middleware-managed context state — closest to multi-tenancy in the batch
    issues:
      - "Source label `single-user / per-request tenant / workspace-keyed / not applicable / other` is an enumeration of values, not a sub-purpose; consolidated to canonical `tenancy model`"
      - "DaInfernalCoder source had no `###` subheading at all — content directly under section heading; promoted to canonical `tenancy model`"

  - subject: mcp
    section: 8. Capabilities exposed
    samples_in_batch: 5
    sub_purposes_seen:
      "tools / resources / prompts / sampling / roots / logging / other": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Lists the MCP primitives the server exposes — tool names with brief descriptions, plus mention of resources, prompts, sampling, roots, logging where applicable. Tool counts vary widely (3 in Perplexity, 28 in ClickUp, 7 in DeepL).
    issues:
      - "Section label uses a slash-list of primitive types as the field name; that's the canonical taxonomy from the MCP spec, not a free-form sub-purpose"

  - subject: mcp
    section: 9. Observability
    samples_in_batch: 5
    sub_purposes_seen:
      "logging destination + format, metrics, tracing, debug flags": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Captures logging destinations and format, metrics, tracing, and debug flags. Most batch entries report "not captured" or "not documented"; ClickHouse and ClickUp are the exceptions with documented `--debug` flags or middleware-based logging examples.

  - subject: mcp
    section: 10. Host integrations shown in README or repo
    samples_in_batch: 5
    sub_purposes_seen:
      "Claude Desktop": 1
      "Other editors/CLIs": 1
      "pitfalls observed": 5
    shape: open-enumeration
    common_description: |
      Documents per-host integration snippets and pointers (Claude Desktop, Claude Code, Cursor, VS Code, etc.) when README enumerates them; otherwise records "not captured per host". Open-enumeration shape — the host vocabulary is potentially large.
    outliers:
      - sample: ClickHouse--mcp-clickhouse.md
        why: only sample with per-host `###` subheadings (Claude Desktop, Other editors/CLIs)
      - sample: Azure--azure-mcp.md
        why: source had a meta-instruction preamble paragraph ("For each host encountered ... record form ...") — stripped per new rule
    issues:
      - "4 of 5 samples don't enumerate hosts in the source — section may be empty more often than populated"
      - "Azure sample carried original prompt-template meta-instruction text in the section body; stripped"

  - subject: mcp
    section: 11. Claude Code plugin wrapper
    samples_in_batch: 5
    sub_purposes_seen:
      "presence and shape": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Records whether a `.claude-plugin/` wrapper or `.mcp.json` is present in the repo and its shape. Universally `none` / `not present` in this batch.
    issues:
      - "Sub-purpose answer is uniformly `none` across the batch — section may be a marker for absence rather than rich content"

  - subject: mcp
    section: 12. Tests
    samples_in_batch: 5
    sub_purposes_seen:
      "presence, framework, location, notable patterns": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Captures presence of tests, framework used (pytest, pytest-asyncio, etc.), location in the repo, and notable patterns (Docker-Compose-backed integration services, test-density observations).

  - subject: mcp
    section: 13. CI
    samples_in_batch: 5
    sub_purposes_seen:
      "presence, system, triggers, what it runs": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Records CI presence (most commonly GitHub Actions), triggers, and what it runs. Frequently "not captured" or "not documented" in the batch.

  - subject: mcp
    section: 14. Container / packaging artifacts
    samples_in_batch: 5
    sub_purposes_seen:
      "Dockerfile, docker-compose, Helm, systemd, brew formula, etc.": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Lists container and packaging artifacts present (Dockerfile, docker-compose, Helm chart, systemd unit, brew formula, etc.). Dockerfile presence is common; docker-compose is the differentiator for multi-transport servers.

  - subject: mcp
    section: 15. Example client / developer ergonomics
    samples_in_batch: 5
    sub_purposes_seen:
      "MCP Inspector launcher, curl stubs, make targets, dev scripts, sample configs": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Records developer ergonomics — MCP Inspector launchers, curl stubs, make targets, dev scripts, sample configs, management subcommands. Variable across samples; ClickUp's setup subcommands and ClickHouse's `fastmcp.json` are notable.

  - subject: mcp
    section: 16. Repo layout
    samples_in_batch: 5
    sub_purposes_seen:
      "single-package / monorepo / vendored / other": 5
      "pitfalls observed": 5
    shape: closed-set
    common_description: |
      Classifies the repo layout — single-package, monorepo, vendored, other — with brief description of dirs and config files present. All batch samples are single-package.
    outliers:
      - sample: DaInfernalCoder--perplexity-mcp.md
        why: source split layout into `### dirs` / `### config` non-canonical sub-headings; consolidated into canonical paragraph
    issues:
      - "DaInfernalCoder source split section 16 into non-canonical `### dirs` / `### config` — consolidated per new rule"

  - subject: mcp
    section: 17. Notable structural choices
    samples_in_batch: 5
    shape: freeform
    common_description: |
      Freeform bulleted observations about what stood out structurally in the repo — design patterns, unusual choices, distinguishing features. No fixed sub-purpose vocabulary.

  - subject: mcp
    section: 18. Unanticipated axes observed
    samples_in_batch: 5
    shape: freeform
    common_description: |
      Freeform observations about design axes the sample reveals that weren't anticipated by the original section taxonomy — emergent patterns, orthogonal concerns, design dimensions to fold back into future research.

  - subject: mcp
    section: 19. Python-specific
    samples_in_batch: 3
    sub_purposes_seen:
      "SDK / framework variant": 3
      "Python version floor": 3
      "Packaging": 3
      "Entry point": 3
      "Install workflow expected of end users": 3
      "Async and tool signatures": 3
      "Type / schema strategy": 3
      "Testing": 3
      "Dev ergonomics": 3
      "Notable Python-specific choices": 3
    shape: closed-set
    common_description: |
      Present only in Python repos. Captures Python-specific details — SDK variant (raw `mcp`, FastMCP 1.x/2.x), version floor, packaging (build backend, lock file, version manager), entry point shape (console script vs `__main__.py` vs bare script), install workflow, async patterns, type strategy, testing tooling, dev ergonomics, and notable Python choices.
    outliers:
      - sample: Azure--azure-mcp.md
        why: section absent (C# repo)
      - sample: DaInfernalCoder--perplexity-mcp.md
        why: section absent (JavaScript repo)
    issues:
      - "Source samples split each canonical sub-purpose into multiple bullet sub-items (e.g. 3 bullets under SDK/framework variant for variant + version pin + import pattern); consolidated each canonical sub-purpose to a single paragraph per the new rule"
      - "Section frequently includes `not captured` / `not extracted` answers within otherwise-populated sub-purposes — keep verbatim per rule"

  - subject: mcp
    section: 20. Gaps
    samples_in_batch: 5
    shape: freeform
    common_description: |
      Freeform paragraph or bullet list of what the researcher couldn't determine from the available surface (README, directory listing, etc.). Captures epistemic-humility signal — what's still unknown after the sample.
    outliers:
      - sample: Azure--azure-mcp.md
        why: section also carries a "Canonical successor" appendix beyond pure gaps; folded into the section body since no separate canonical section exists for redirected/archived repos
    issues:
      - "Source `### what couldn't be determined` sub-heading is non-canonical and the section is freeform per canonical spec; flattened to paragraphs"
      - "Azure sample uniquely needed to express a canonical-successor pointer; consider whether retired/archived repos warrant a canonical extra section"
