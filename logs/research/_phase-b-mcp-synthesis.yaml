sections:
  Identification:
    total_samples: 104
    sub_purposes_seen:
      url: 104
      stars: 104
      last-commit: 104
      license: 104
      default branch: 104
      one-line purpose: 104
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: Repo identity card — fixed metadata fields used for cross-sample correlation. Stable closed vocabulary across
        the batch.
    - batch-02: Identifies the upstream repo with provenance metadata (URL, stars, last-commit, license, default branch) and
        a one-line purpose statement summarizing what the server does. Stable vocabulary across samples.
    - batch-03: Stable identification block recording where the repo lives, its popularity/recency, license, default branch,
        and a one-line purpose statement. Vocabulary is fixed across the batch.
    - batch-04: Standard repo identification block — URL, stars, last-commit (often "not captured" for monorepo sub-paths),
        license, default branch, and a one-line purpose statement summarizing what the server does.
    - batch-05: Repository fingerprint — URL, popularity, recency, license, default branch, and a one-line purpose. Stable
        closed-set vocabulary.
    - batch-06: Stable identification block — URL, stars, last-commit, license, default branch, and one-line purpose. Acts
        as the at-a-glance card before axis-by-axis analysis.
    - batch-07: Stable identification block — every sample uses exactly the same six sub-purposes.
    - batch-08: Stable repo-metadata header. Same six fields recur in every sample.
    - batch-09: Stable six-field identification block on every sample.
    - batch-10: Stable identification metadata block. Slots uniformly present.
    outliers:
    - sample: Azure--azure-mcp.md
      why: archived repo — `last-commit` carries archival narrative rather than a date; `one-line purpose` is "TBD"
      batch: batch-02
    issues:
    - batch-01: Source labels for last-commit varied ('last-commit' vs 'last-commit (date or relative)'); rewrite normalized
        to 'last-commit'.
    - batch-02: '`last-commit` field name varied in source (`last-commit (date or relative)`); normalized to canonical `last-commit`'
    - batch-03: Source files used 'last-commit (date or relative)' as the heading text; canonicalized to 'last-commit'.
    - batch-04: Source files used a longer label '### last-commit (date or relative)' which canonicalizes to '### last-commit';
        rewrites consolidated.
    - batch-06: Several samples carry parenthetical guidance in headings ('last-commit (date or relative)') as authoring scaffolding;
        canonicalized to bare 'last-commit'.
    - batch-07: stars values vary in style ('~158', '99', '24.7k', '1,500'); template should pick a canonical format
    - batch-07: last-commit values vary between dates, version refs, and 'not captured'; template should accept either form
    - batch-08: Several samples answer last-commit with a release tag ('v0.11.1', '2026.1.26') rather than a commit date;
        the sub-purpose probably should be 'last-commit or last-release' to reflect the corpus' actual answer shape.
    - batch-08: license values often combine two licenses ('Apache 2.0 (new) / MIT (existing)'); the field handles dual-license
        repos in practice.
    - batch-09: Most sources keep 'last-commit (date or relative)' parenthetical scaffolding in the heading; canonicalize
        to bare 'last-commit'.
    - batch-10: last-commit varies wildly between calendar dates, version+date pairs, activity descriptions ('103 commits'),
        and 'not captured'; template should accept any of these forms
  1. Language and runtime:
    total_samples: 104
    sub_purposes_seen:
      language(s) + version constraints: 104
      framework/SDK in use: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: Names the implementation language(s), version floor or edition, and the MCP SDK / framework variant the server
        is built on. Stable across the batch.
    - batch-02: Captures the primary language(s) and any version constraints, plus the MCP framework or SDK variant in use
        (raw `mcp` SDK, FastMCP 1.x/2.x, language-specific SDKs). Pitfalls slot rarely populated.
    - batch-03: Captures the implementation language(s), version-floor pin, and which MCP SDK/framework is used (raw mcp Python
        SDK, FastMCP 1.x/2.x, TypeScript SDK, or hand-rolled). Pitfalls are usually 'none noted' but occasionally absorb a
        'what couldn't be determined' list.
    - batch-04: Captures language choice plus version floor (Python `>=3.10` dominates this batch; one Rust outlier) and which
        MCP SDK or framework variant is used (raw `mcp`, FastMCP 1.x/2.x/3.x, or custom). Two stable sub-purposes.
    - batch-05: Languages used (often with GitHub-detected percentages), runtime version floor, and the framework or SDK driving
        the server.
    - batch-06: Implementation language(s) with version-floor constraints and the MCP framework or SDK choice. Pitfalls slot
        most often empty; when populated, points at unusual version floors or version-constraint omissions.
    - batch-07: Records primary language + version floor and the MCP framework or SDK variant. Pitfalls slot mostly empty
        except where version floor itself is the concern.
    - batch-08: 'Captures the runtime stack: primary language and version floor, plus what MCP SDK or framework the server
        builds on.'
    - batch-09: Identifies the primary language(s) plus minimum version, and the MCP framework/SDK variant.
    - batch-10: Identifies primary language(s), version constraints, MCP SDK/framework variant.
    outliers:
    - sample: apollographql--apollo-mcp-server.md
      why: Rust + Cargo (only non-Python sample in batch); framework field is generic ("Rust MCP implementation; Apollo GraphQL
        ecosystem")
      batch: batch-04
    - sample: awslabs--mcp-lambda-handler.md
      why: Custom — does not depend on `mcp` or `fastmcp`; framework variant is "custom"
      batch: batch-04
    - sample: misbahsy--video-audio-mcp.md
      why: pitfall actually populated — Python 3.13 floor flagged as aggressive
      batch: batch-07
    issues:
    - batch-02: '`pitfalls observed` is `none noted in this repo` in 4 of 5 samples — consider folding into the section''s
        primary content or making it conditional'
    - batch-03: 'Pitfalls in this section sometimes carry gap-style content (''what couldn''t be determined: ...'') instead
        of true pitfalls — overlap with section 20.'
    - batch-04: pitfalls observed in section 1 was 'none noted' for 6/7 samples and a duplicate of section-20 Gaps in 1/7
        — strong candidate for folding pitfalls into a section-level Notes or omitting entirely.
    - batch-05: section-1 'pitfalls observed' frequently restates section-20 Gaps; 5/12 in this batch dedup'd to 'none noted'.
        Slot becomes near-empty after dedup — consider whether section 1 needs its own pitfalls slot
    - batch-09: '''pitfalls observed'' is empty in most samples for this section; consider whether section 1 needs the slot
        at all.'
    - batch-10: pitfalls observed appears 14/14 but fires non-empty in only 1 sample; consider folding into structural-choices
        section or making explicitly optional
  2. Transport:
    total_samples: 104
    sub_purposes_seen:
      supported transports: 104
      how selected: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: Which MCP transports (stdio, HTTP/streamable-HTTP, SSE) the server supports and how a host picks one (CLI
        flag, env, default-only, etc.). Stable shape across the batch.
    - batch-02: Records which MCP transports the server supports (stdio, SSE, Streamable HTTP, custom) and the mechanism used
        to select among them (CLI flag, env var, separate entry point, default-only). Most servers default to stdio; multi-transport
        support varies.
    - batch-03: Records which transports the server speaks (stdio is universal; many add streamable-http, some HTTP/SSE) and
        the mechanism for selecting between them (CLI flag, env var, positional subcommand, or implicit/default).
    - batch-04: 'Two sub-purposes: which transports the server supports (stdio dominant; streamable-http for HTTP-mode servers;
        HTTP-via-API-Gateway for Lambda) and the mechanism for choosing between them (CLI flag, env var, config file, or "not
        configurable / single mode").'
    - batch-05: Which transports the server speaks (stdio dominates) and the mechanism that selects among them.
    - batch-06: Which transports the server supports (stdio, HTTP/SSE, streamable-http, in-memory) and how it selects between
        them — CLI flag, separate console script, separate subcommand, env var, or implicit default.
    - batch-07: Lists supported MCP transports (stdio, SSE, HTTP, streamable-http) and how the active transport is selected.
    - batch-08: Names the transports the server speaks (stdio, HTTP/SSE, streamable-http, WebSocket, ChannelTransport) and
        how one is chosen.
    - batch-09: Names the MCP transports the server speaks (stdio dominant; SSE, streamable-http, http appear in larger servers;
        one HTTP-only remote service).
    - batch-10: Lists transports the server supports and the selection mechanism.
    outliers:
    - sample: Azure--azure-mcp.md
      why: not extracted — archived
      batch: batch-02
    - sample: DaInfernalCoder--perplexity-mcp.md
      why: transport selection inferred from SDK use, not documented
      batch: batch-02
    - sample: ahmedmustahid--postgres-mcp-server.md
      why: Transport selected via positional subcommand rather than flag/env — only sample in batch using this pattern.
      batch: batch-03
    - sample: awslabs--mcp-lambda-handler.md
      why: Pure HTTP via API Gateway; no stdio path at all
      batch: batch-04
    - sample: apollographql--apollo-mcp-server.md
      why: Transports not extracted from README (redirected to external docs)
      batch: batch-04
    - sample: bhauman--clojure-mcp.md
      why: uses nREPL as transport — REPL-as-transport unusual
      batch: batch-05
    - sample: cloudflare--mcp-server-cloudflare.md
      why: transports selected by URL path on same Worker (/mcp vs /sse)
      batch: batch-05
    issues:
    - batch-02: '`how selected` parenthetical examples in source labels were stripped to canonical short form'
    - batch-06: '''how selected'' source labels are highly variable (parenthesized lists like ''flag, env, separate entry,
        auto-detect''); canonicalize to bare ''how selected''.'
    - batch-09: Several samples use 'inferred stdio' when not explicitly documented — consider canonical phrasing.
  3. Distribution:
    total_samples: 104
    sub_purposes_seen:
      every mechanism observed: 104
      published package name(s): 104
      install commands shown in README: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: Enumerates the distribution channels (PyPI, npm, Docker, Homebrew, go install, GitHub release, etc.), the
        package name(s) under each, and the install commands the README actually shows. Strong predictor of cross-ecosystem
        reach.
    - batch-02: Enumerates how end users obtain the server (PyPI, npm, uvx, npx, Docker, source clone, install-from-git, Smithery),
        the published package names where applicable, and the README's recommended install commands. Pitfalls slot occasionally
        records design observations rather than warnings.
    - batch-03: Enumerates distribution channels (PyPI/uvx, npm/npx, Docker registries, Smithery, source clone), names the
        canonical published package, and quotes the README install one-liner.
    - batch-04: Three stable sub-purposes — list of every distribution channel observed (PyPI, uvx, Docker, source build,
        Cargo, GitHub releases), the canonical published package name(s), and the install commands surfaced in the README.
        PyPI + uvx + Docker triad dominates Python samples.
    - batch-05: 'How the server is distributed: registry channels, runner shims, Docker images, source-only paths.'
    - batch-06: Inventory of distribution channels (PyPI/uvx, npm/npx, Docker/GHCR, GitHub release binaries, source clone,
        hosted SaaS endpoints, Smithery, mcp-get) along with package name(s) and install commands shown to users. Pitfalls
        in this section frequently restate Gaps; consider folding.
    - batch-07: Captures distribution channels, package names, and install one-liners. Pitfalls slot is the most contaminated
        across the batch.
    - batch-08: 'Inventory of how the server is shipped: PyPI/uvx, npm/npx, Docker images, MCP Bundles (.mcpb), source-only,
        hosted service.'
    - batch-09: Enumerates every distribution channel, package name(s), and install one-liner(s).
    - batch-10: Catalogs every distribution channel, package names, install commands.
    outliers:
    - sample: DiversioTeam--clickup-mcp.md
      why: install-from-git via uvx; no PyPI publication; pitfalls slot used to flag distribution-pattern observations
      batch: batch-02
    - sample: cloudflare--mcp-server-cloudflare.md
      why: remote-only — no installable artifact
      batch: batch-05
    - sample: cyanheads--perplexity-mcp-server.md
      why: no published npm package; source-clone-only
      batch: batch-05
    issues:
    - batch-01: '''every mechanism observed'' source headings carried long parenthesized variants (''(PyPI, npm, uvx, npx,
        ...)'') — canonical short form preserved facts and shed the catalogue.'
    - batch-02: '`pitfalls observed` is sometimes used as an observation slot for the section''s content (DiversioTeam, DaInfernalCoder,
        Azure) rather than for actual pitfalls — vocabulary mismatch with the field name'
    - batch-03: When a server is not published to a package manager (PubMed, FuzzingLabs), this is signal — preserved as 'not
        published to PyPI at time of research' / 'no PyPI publishing'.
    - batch-04: pitfalls observed in section 3 frequently contained content belonging to other sections (axis observations
        duplicating section 18, or 'what couldn't be determined' content duplicating section 20). Three of the seven samples
        needed relocations from this slot — strong signal that 'pitfalls observed' is being misused as overflow for cross-section
        notes.
    - batch-07: section 3 pitfalls slot acts as a magnet for cross-section contamination — ~4 of 14 samples had it carrying
        section 17 (notable choices) or section 20 (gaps) content
    - batch-09: When unpublished or remote-only, 'published package name(s)' carries language like 'not published / remote-only
        / Smithery as primary'. Worth a canonical 'distribution status' axis.
  4. Entry point / launch:
    total_samples: 104
    sub_purposes_seen:
      command(s) users/hosts run: 104
      wrapper scripts, launchers, stubs: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: The exact command a host or user invokes to launch the server, plus any wrapper scripts (Docker entrypoints,
        npm shims, uvx invocations) interposed between the host and the binary.
    - batch-02: Captures the launch command users or hosts invoke (console script, npx, uvx, bare `python main.py`, etc.)
        and any wrapper scripts, launchers, or stubs (Dockerfiles, dev-compose files, console-script entry points). Pitfalls
        rarely populated.
    - batch-03: The exact command users or MCP hosts invoke (uvx X / npx X / docker run X / python -m X) plus any wrapper
        layer (console-script entry, Dockerfile, Makefile, smithery.yaml).
    - batch-04: Two sub-purposes — the actual command(s) users or hosts run to launch the server, and any wrapper scripts,
        console-script entries, launchers, or stubs that wrap that command. For Python servers a `[project.scripts]` console
        script + `module:main` is the recurring shape.
    - batch-05: The exact command end users invoke (console script, npx/bunx/uvx, npm script, Clojure tool alias, generated
        binary) and any wrapper layer.
    - batch-06: Literal commands a user or host invokes to launch the server, plus wrapper scripts, launchers, stubs, or setup
        subcommands. Pitfalls almost always 'none'.
    - batch-07: Captures user-/host-facing launch command and any wrapper scripts. Pitfalls slot universally empty.
    - batch-08: Names the actual command users or host configs run and any auxiliary launchers.
    - batch-09: Actual command users put in their MCP host config, plus any wrapper scripts/launchers/stubs.
    - batch-10: Captures exact launch command and any wrapper script/stub.
    outliers:
    - sample: awslabs--mcp-lambda-handler.md
      why: Library, not a server — 'command' is N/A; entry point is a Lambda handler that imports and delegates
      batch: batch-04
    issues: []
  5. Configuration surface:
    total_samples: 104
    sub_purposes_seen:
      how config reaches the server: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: How configuration is delivered — env vars, CLI flags, YAML/JSON config files, host-passed params, or combinations.
        The MySQL and Elasticsearch samples are env-var-driven; the toolbox sample uses a YAML manifest with hot reload.
    - batch-02: Describes how runtime configuration reaches the server — env vars, CLI args, `.env` files, OS-native config
        dirs (`platformdirs`), persistent state, FastMCP config files. Three distinct credential-storage conventions surface
        across the batch (env vars, `.env`, OS config dir).
    - batch-03: How configuration arrives at runtime — env vars, CLI flags, .env, JSON config files, host-injected env blocks,
        mounted credential files, optional per-tool enablement configs.
    - batch-04: Single sub-purpose describing the channels through which configuration reaches the server — env vars, CLI
        args, config files, and combinations. Env-var-first is the dominant Python pattern (especially for AWS-credentialed
        servers); config-file-only appears in the Rust/Apollo sample.
    - batch-05: How configuration arrives — env vars dominant; CLI args, .env, host JSON config, framework-specific configs
        as variants.
    - batch-06: How configuration enters the process — env vars, CLI flags, JSON config files, host-passed parameters, combinations
        — with actual variable and flag names enumerated.
    - batch-07: How config reaches the server. Originals frequently carried meta-instruction text in the heading; stripped.
    - batch-08: 'Mechanisms by which configuration enters the server: env vars, CLI flags, JSON/YAML config files, .env, host-passed
        params, query-string params on hosted endpoints.'
    - batch-09: 'How the server gets its configuration: env vars, CLI flags, .env, URI schemes, JSON host config, runtime
        tool-call reconfiguration.'
    - batch-10: Describes the configuration channel, often documenting precedence.
    outliers:
    - sample: DiversioTeam--clickup-mcp.md
      why: uses `platformdirs`-based persistent config rather than the more common env-var pattern
      batch: batch-02
    issues:
    - batch-02: Source labels carried parenthetical example lists (`env vars, CLI args, config file w/ path + format, ...`);
        stripped to canonical short label
    - batch-07: several samples retained meta-instruction scaffolding in headings
  6. Authentication:
    total_samples: 104
    sub_purposes_seen:
      flow: 104
      where credentials come from: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: Auth model (static token, username/password, IAM/ADC, delegated, none) and the channel that delivers credentials
        (env vars, config file, ambient cloud identity).
    - batch-02: Captures the auth flow (static API key, bearer token, none, OAuth, transport-conditional) and where credentials
        are sourced (env var, CLI arg, config file, persistent store, host-passed params). Most batch entries are static API
        keys; ClickHouse is transport-conditional (none on stdio, bearer token on HTTP/SSE).
    - batch-03: Auth mechanism (static API key/secret pair, connection-string credentials, OAuth, kubeconfig, none) and the
        channel that delivers credentials (env var, flag, mounted file, embedded in DSN). OAuth is rare across the batch.
    - batch-04: Two sub-purposes — auth flow (none, AWS credential chain, OAuth, API Gateway Authorizer, per-API mix) and
        credential source (env, AWS profile, request headers, upstream authorizer). AWS credential chain dominates; API-Gateway-delegated
        and per-API-mixed are notable variants.
    - batch-05: Auth mechanism (none, API key, token, OAuth, JWT, vendor cloud creds, DB URI) and the channel that delivers
        credentials.
    - batch-06: Authentication mechanism (static token, API key, OAuth, kubeconfig delegation, none) and the source of credentials
        (env var, dashboard-issued token, OAuth provider, kubeconfig file). Multiple-mechanism support (Basic + OAuth + API
        Key) appears for enterprise SaaS targets.
    - batch-07: Auth flow type and where credentials originate. Many local-file servers answer "none / N/A" — preserved verbatim
        as signal.
    - batch-08: Auth scheme and where credentials originate. Several samples answer 'not applicable'.
    - batch-09: Auth model and credential source.
    - batch-10: Captures auth flow and credential source.
    outliers:
    - sample: awslabs--aws-documentation-mcp-server.md
      why: Auth flow is 'none required' — public docs fetch; credentials N/A
      batch: batch-04
    - sample: awslabs--openapi-mcp-server.md
      why: Auth is per-spec (Basic, Bearer, API Key, AWS Cognito), each spec independent
      batch: batch-04
    - sample: cyanheads--git-mcp-server.md
      why: tri-mode auth (none/jwt/oauth) selectable via env
      batch: batch-05
    - sample: cloudflare--mcp-server-cloudflare.md
      why: OAuth-like flow on remote endpoints; mcp-remote handles handshake
      batch: batch-05
    issues: []
  7. Multi-tenancy:
    total_samples: 104
    sub_purposes_seen:
      tenancy model: 104
      pitfalls observed: 97
    shape_consensus:
      closed-set: 10
    common_descriptions:
    - batch-01: Whether the server is single-tenant (one connection per process), per-request tenant-keyed, workspace-keyed,
        or N/A. All three batch samples are single-tenant per process.
    - batch-02: Describes the tenancy model — single-user, per-request tenant, workspace-keyed, not applicable. Most servers
        are implicitly single-user (single API key per deployment); ClickHouse is the standout with per-request connection
        overrides via middleware.
    - batch-03: Whether the server is single-user per process, single-connection per instance, or supports per-request tenant
        switching. Every sample in batch is single-user/single-connection; HTTP-transport variants explicitly note no per-request
        switching.
    - batch-04: Single sub-purpose describing the tenancy model — single-user (most common), per-request-tenant (Lambda model),
