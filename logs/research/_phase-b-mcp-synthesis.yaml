    - batch-07: Single-user vs per-request tenant vs workspace-keyed vs not-applicable. Source headings typically used long
        enumeration form; canonicalized to `tenancy model`.
    - batch-08: Single-user vs single-merchant vs per-request-tenant via OAuth vs workspace-keyed vs not-applicable.
