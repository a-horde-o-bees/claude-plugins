section_observations:
  - subject: mcp
    section: Identification
    samples_in_batch: 16
    sub_purposes: {url: 16, stars: 16, license: 16, "default branch": 16, "one-line purpose": 16, "last-commit (date or relative)": 13, "last-commit": 3}
    anomalies: ["two label variants for last-commit field — '(date or relative)' suffix on 13 samples vs bare 'last-commit' on 3 (idosal, korotovsky, makenotion)"]
  - subject: mcp
    section: 1. Language and runtime
    samples_in_batch: 16
    sub_purposes: {"language(s) + version constraints": 16, "framework/SDK in use": 16, "pitfalls observed": 15}
  - subject: mcp
    section: 2. Transport
    samples_in_batch: 16
    sub_purposes: {"supported transports": 16, "pitfalls observed": 16, "how selected": 10, "how selected (flag, env, separate entry, auto-detect, etc.)": 6}
    anomalies: ["label drift on 'how selected' sub-purpose — short form (10 samples) and long parenthesized form (6 samples) both present"]
  - subject: mcp
    section: 3. Distribution
    samples_in_batch: 16
    sub_purposes: {"every mechanism observed": 15, "published package name(s)": 16, "install commands shown in README": 14, "pitfalls observed": 10, "every mechanism observed (PyPI, npm, uvx, npx, Docker, Homebrew, Cargo, Go install, GitHub release binary, source-only, or other)": 1}
    anomalies: ["multiple samples have stray '- pitfalls observed:' bullets remain unconverted because section already had ### subheadings (idempotency block)", "labeveryday: 'install commands shown in README' kept as bullet because section already had ### headings"]
  - subject: mcp
    section: 4. Entry point / launch
    samples_in_batch: 16
    sub_purposes: {"command(s) users/hosts run": 16, "wrapper scripts, launchers, stubs": 13, "wrapper scripts": 3, "pitfalls observed": 16}
    anomalies: ["label drift on wrapper-scripts sub-purpose — full form on 13 vs short 'wrapper scripts' on 3 (idosal, korotovsky, makenotion)"]
  - subject: mcp
    section: 5. Configuration surface
    samples_in_batch: 16
    sub_purposes: {"how config reaches the server": 15, "how config reaches the server (env vars, CLI args, config file w/ path + format, stdin prompt, OS keyring, host-passed params, combinations)": 1, "pitfalls observed": 16}
  - subject: mcp
    section: 6. Authentication
    samples_in_batch: 16
    sub_purposes: {"flow": 15, "where credentials come from": 16, "pitfalls observed": 16, "flow (static token, OAuth w/ description, per-request header, none, other)": 1}
  - subject: mcp
    section: 7. Multi-tenancy
    samples_in_batch: 16
    sub_purposes: {"single-user / per-request tenant / workspace-keyed / not applicable / other": 13, "pitfalls observed": 15}
    anomalies: ["idosal, korotovsky, makenotion: section has plain bullets without colon (no labeled sub-purpose), so no level-3 heading was created"]
  - subject: mcp
    section: 8. Capabilities exposed
    samples_in_batch: 16
    sub_purposes: {"tools / resources / prompts / sampling / roots / logging / other": 12, "tools": 3, "resources": 1, "pitfalls observed": 16}
    anomalies: ["korotovsky: split into separate 'tools' and 'resources' subheadings", "idosal, makenotion: only 'tools' subheading", "jlowin: capability bullet has multi-line content with embedded code block — current regex cannot capture multi-line content"]
  - subject: mcp
    section: 9. Observability
    samples_in_batch: 16
    sub_purposes: {"logging destination + format, metrics, tracing, debug flags": 13, "logging": 1, "pitfalls observed": 16}
    anomalies: ["korotovsky: short label 'logging' instead of canonical", "idosal, makenotion: section opens with plain bullet so value has no subheading"]
  - subject: mcp
    section: 10. Host integrations shown in README or repo
    samples_in_batch: 16
    sub_purposes: {"Claude Desktop": 9, "Claude Code": 3, "Other": 3, "Cursor": 3, "Smithery": 2, "VS Code": 1, "VSCode": 1, "Other editors/CLIs": 1, "JetBrains IDE": 1, "VSCode Copilot Chat": 1, "form": 1, "Form": 1, "pitfalls observed": 16}
    anomalies: ["host enumeration is highly variable", "case drift: 'VS Code' (jbeno) vs 'VSCode' (jparkerweb)", "case drift: 'form' vs 'Form'"]
  - subject: mcp
    section: 11. Claude Code plugin wrapper
    samples_in_batch: 16
    sub_purposes: {"presence and shape": 13, "pitfalls observed": 16}
    anomalies: ["idosal, korotovsky, makenotion: opens with plain bullet rather than 'presence and shape' subheading"]
  - subject: mcp
    section: 12. Tests
    samples_in_batch: 16
    sub_purposes: {"presence, framework, location, notable patterns": 13, "pitfalls observed": 16}
  - subject: mcp
    section: 13. CI
    samples_in_batch: 16
    sub_purposes: {"presence, system, triggers, what it runs": 13, "pitfalls observed": 14}
  - subject: mcp
    section: 14. Container / packaging artifacts
    samples_in_batch: 16
    sub_purposes: {"Dockerfile, docker-compose, Helm, systemd, brew formula, etc.": 13, "pitfalls observed": 16}
  - subject: mcp
    section: 15. Example client / developer ergonomics
    samples_in_batch: 16
    sub_purposes: {"MCP Inspector launcher, curl stubs, make targets, dev scripts, sample configs": 13, "pitfalls observed": 15}
  - subject: mcp
    section: 16. Repo layout
    samples_in_batch: 16
    sub_purposes: {"single-package / monorepo / vendored / other": 9, "single-package / monorepo / vendored / other — describe what's there": 4, "dirs": 3, "config": 3, "additional": 1, "documentation": 1, "pitfalls observed": 16}
    anomalies: ["label drift on shape sub-purpose; idosal, korotovsky, makenotion decompose into separate dirs/config/additional/documentation subheadings"]
  - subject: mcp
    section: 17. Notable structural choices
    samples_in_batch: 16
    sub_purposes: {"Minimal dependencies": 1, "Security posture": 1, "Programmatic embedding as first-class": 1}
    anomalies: ["section is overwhelmingly flat bulleted lists — only 3 of 16 samples surface any subheading, each unique to its sample"]
  - subject: mcp
    section: 18. Unanticipated axes observed
    samples_in_batch: 16
    sub_purposes: {"decision dimensions this repo reveals": 5, "Embeddability": 1}
    anomalies: ["korotovsky: three '— axis' bullets converted to long-form subheadings", "microsoft: 'Embeddability' as one-off subheading"]
  - subject: mcp
    section: 19. Python-specific
    samples_in_batch: 8
    sub_purposes: {"SDK / framework variant": 8, "Python version floor": 8, "Packaging": 8, "Entry point": 8, "Async and tool signatures": 8, "Type / schema strategy": 8, "Testing": 8, "Dev ergonomics": 8, "Notable Python-specific choices": 8, "Install workflow expected of end users": 7, "Install workflow expected of end users (of the framework)": 1}
    anomalies: ["8 of 16 samples have section 19 (Python only)", "jlowin uses '(of the framework)' suffix"]
  - subject: mcp
    section: 20. Gaps
    samples_in_batch: 16
    sub_purposes: {"what couldn't be determined": 2, "Source could be examined": 1}
    anomalies: ["section is predominantly flat bulleted lists", "mark3labs: 'Source could be examined' subheading is anomalous"]
