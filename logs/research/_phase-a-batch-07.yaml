section_observations:
  - subject: mcp
    section: Identification
    samples_in_batch: 14
    sub_purposes_seen: {url: 14, stars: 14, last-commit: 14, license: 14, default branch: 14, one-line purpose: 14}
    shape: closed-set
    common_description: |
      Stable identification block — every sample uses exactly the same six sub-purposes.
    issues:
      - "stars values vary in style ('~158', '99', '24.7k', '1,500'); template should pick a canonical format"
      - "last-commit values vary between dates, version refs, and 'not captured'; template should accept either form"
  - subject: mcp
    section: 1. Language and runtime
    samples_in_batch: 14
    sub_purposes_seen: {"language(s) + version constraints": 14, "framework/SDK in use": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Records primary language + version floor and the MCP framework or SDK variant. Pitfalls slot mostly empty except where version floor itself is the concern.
    outliers:
      - sample: misbahsy--video-audio-mcp.md
        why: pitfall actually populated — Python 3.13 floor flagged as aggressive
  - subject: mcp
    section: 2. Transport
    samples_in_batch: 14
    sub_purposes_seen: {"supported transports": 14, how selected: 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Lists supported MCP transports (stdio, SSE, HTTP, streamable-http) and how the active transport is selected.
  - subject: mcp
    section: 3. Distribution
    samples_in_batch: 14
    sub_purposes_seen: {"every mechanism observed": 14, "published package name(s)": 14, install commands shown in README: 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Captures distribution channels, package names, and install one-liners. Pitfalls slot is the most contaminated across the batch.
    issues:
      - "section 3 pitfalls slot acts as a magnet for cross-section contamination — ~4 of 14 samples had it carrying section 17 (notable choices) or section 20 (gaps) content"
  - subject: mcp
    section: 4. Entry point / launch
    samples_in_batch: 14
    sub_purposes_seen: {"command(s) users/hosts run": 14, "wrapper scripts, launchers, stubs": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Captures user-/host-facing launch command and any wrapper scripts. Pitfalls slot universally empty.
  - subject: mcp
    section: 5. Configuration surface
    samples_in_batch: 14
    sub_purposes_seen: {how config reaches the server: 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      How config reaches the server. Originals frequently carried meta-instruction text in the heading; stripped.
    issues:
      - "several samples retained meta-instruction scaffolding in headings"
  - subject: mcp
    section: 6. Authentication
    samples_in_batch: 14
    sub_purposes_seen: {flow: 14, where credentials come from: 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Auth flow type and where credentials originate. Many local-file servers answer "none / N/A" — preserved verbatim as signal.
  - subject: mcp
    section: 7. Multi-tenancy
    samples_in_batch: 14
    sub_purposes_seen: {tenancy model: 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Single-user vs per-request tenant vs workspace-keyed vs not-applicable. Source headings typically used long enumeration form; canonicalized to `tenancy model`.
    issues:
      - "marlonluo2018--pandas-mcp-server originally used section 7 pitfalls slot to hold sections 17 and 18 content; relocated"
  - subject: mcp
    section: 8. Capabilities exposed
    samples_in_batch: 14
    sub_purposes_seen: {"tools / resources / prompts / sampling / roots / logging / other": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      What MCP capability surfaces the server exposes. Tool counts range 1-92 in this batch; resources rare; prompts/sampling/roots almost never present.
  - subject: mcp
    section: 9. Observability
    samples_in_batch: 14
    sub_purposes_seen: {"logging destination + format, metrics, tracing, debug flags": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Logging, metrics, tracing, debug flags. Most samples answer "not surfaced" — observability consistently undeclared in MCP server READMEs.
  - subject: mcp
    section: 10. Host integrations shown in README or repo
    samples_in_batch: 14
    sub_purposes_seen: {"Claude Desktop": 8, "Claude Code": 3, Cursor: 5, "VS Code": 3, VSCode: 1, "VSCode Copilot Chat": 1, Smithery: 2, Zed: 1, "GitHub Copilot CLI": 1, "JetBrains IDE": 1, Windsurf: 1, Cline: 1, Goose: 1, Junie: 1, Copilot: 1, Factory: 1, "Gemini CLI": 1, "LM Studio": 1, Kiro: 1, opencode: 1, "Qodo Gen": 1, Warp: 1, Codex: 1, Antigravity: 1, Amp: 1, Claude: 1, "Enterprise Slack": 1, "Metoro Kubernetes monitoring MCP server": 1, pitfalls observed: 14}
    shape: open-enumeration
    common_description: |
      Open enumeration of hosts. One `### per host` is the right model. Vocabulary is unbounded — playwright-mcp listed 19 hosts; correlations across batches suggest 30+ distinct host names will appear across the full corpus.
    outliers:
      - sample: microsoft--playwright-mcp.md
        why: 19 hosts listed — highest cardinality
      - sample: korotovsky--slack-mcp-server.md
        why: lists "Claude" rather than "Claude Desktop"/"Claude Code"; also "Enterprise Slack" which is a deployment flavor, not a host
      - sample: metoro-io--mcp-golang.md
        why: lists "Metoro Kubernetes monitoring MCP server" as production reference, not a host
    issues:
      - "host vocabulary is unbounded; canonicalization (Claude vs Claude Desktop vs Claude Code) needed"
      - "some `###` host entries are not actually hosts (Enterprise Slack flavor, production-reference servers); template guidance should require a per-entry test 'is this a host integration?'"
      - "for SDK/framework samples, the section is appropriately answered 'not applicable' — keep that as a valid emission"
  - subject: mcp
    section: 11. Claude Code plugin wrapper
    samples_in_batch: 14
    sub_purposes_seen: {presence and shape: 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Presence/shape of any Claude Code plugin wrapper. Across this batch every sample answers "not present" or "not applicable" — no real wrappers found.
    issues:
      - "every sample in this batch answers 'not present' — section folding into a single boolean signal across the corpus"
  - subject: mcp
    section: 12. Tests
    samples_in_batch: 14
    sub_purposes_seen: {"presence, framework, location, notable patterns": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Test presence, framework, location, notable patterns.
  - subject: mcp
    section: 13. CI
    samples_in_batch: 14
    sub_purposes_seen: {"presence, system, triggers, what it runs": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      CI presence (typically GitHub Actions), workflow files, triggers, what the pipeline runs.
  - subject: mcp
    section: 14. Container / packaging artifacts
    samples_in_batch: 14
    sub_purposes_seen: {"Dockerfile, docker-compose, Helm, systemd, brew formula, etc.": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Container and packaging artifacts. Frequently "none observed"; when populated, Dockerfile + docker-compose are the dominant pair.
  - subject: mcp
    section: 15. Example client / developer ergonomics
    samples_in_batch: 14
