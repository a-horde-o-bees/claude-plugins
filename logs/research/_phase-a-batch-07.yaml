  - subject: mcp
    section: 16. Repo layout
    samples_in_batch: 14
    sub_purposes_seen: {"single-package / monorepo / vendored / other": 14, pitfalls observed: 14}
    shape: closed-set
    common_description: |
      Repo organization category. Most samples are single-package.
    issues:
      - "korotovsky and makenotion originally split into `### dirs`/`### config`/`### additional`/`### documentation` sub-headings — consolidated"
  - subject: mcp
    section: 17. Notable structural choices
    samples_in_batch: 14
    shape: freeform
    common_description: |
      Freeform observations about distinctive design or structural choices. All 14 samples populate this; sources vary between bulleted lists and prose.
  - subject: mcp
    section: 18. Unanticipated axes observed
    samples_in_batch: 14
    shape: freeform
    common_description: |
      Freeform observations about decision dimensions or axes the sample reveals.
    issues:
      - "korotovsky, lanbaoshen, microsoft used `### per-axis` subheads; spec says freeform unless source clearly enumerates — folded into paragraph"
  - subject: mcp
    section: 19. Python-specific
    samples_in_batch: 9
    sub_purposes_seen: {"SDK / framework variant": 9, "Python version floor": 9, "Packaging": 9, "Entry point": 9, "Install workflow expected of end users": 9, "Async and tool signatures": 9, "Type / schema strategy": 9, "Testing": 9, "Dev ergonomics": 9, "Notable Python-specific choices": 9}
    shape: closed-set
    common_description: |
      Present only in Python samples — 9 of 14. Stable 10-sub-purpose vocabulary.
  - subject: mcp
    section: 20. Gaps
    samples_in_batch: 14
    shape: freeform
    common_description: |
      Freeform paragraph listing what couldn't be determined within research budget. Frequent overlap with section 13 pitfalls (CI specifics) and section 3 pitfalls (distribution detail).
    issues:
