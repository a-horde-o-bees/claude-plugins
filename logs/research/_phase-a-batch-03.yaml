section_observations:
  - subject: mcp
    section: Identification
    samples_in_batch: 8
    sub_purposes_seen: {url: 8, stars: 8, last-commit: 8, license: 8, default branch: 8, one-line purpose: 8}
    shape: closed-set
    common_description: |
      Stable identification block recording where the repo lives, its popularity/recency, license, default branch, and a one-line purpose statement. Vocabulary is fixed across the batch.
    issues:
      - "Source files used 'last-commit (date or relative)' as the heading text; canonicalized to 'last-commit'."

  - subject: mcp
    section: 1. Language and runtime
    samples_in_batch: 8
    sub_purposes_seen: {"language(s) + version constraints": 8, "framework/SDK in use": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Captures the implementation language(s), version-floor pin, and which MCP SDK/framework is used (raw mcp Python SDK, FastMCP 1.x/2.x, TypeScript SDK, or hand-rolled). Pitfalls are usually 'none noted' but occasionally absorb a 'what couldn't be determined' list.
    issues:
      - "Pitfalls in this section sometimes carry gap-style content ('what couldn't be determined: ...') instead of true pitfalls — overlap with section 20."

  - subject: mcp
    section: 2. Transport
    samples_in_batch: 8
    sub_purposes_seen: {"supported transports": 8, "how selected": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Records which transports the server speaks (stdio is universal; many add streamable-http, some HTTP/SSE) and the mechanism for selecting between them (CLI flag, env var, positional subcommand, or implicit/default).
    outliers:
      - sample: ahmedmustahid--postgres-mcp-server.md
        why: Transport selected via positional subcommand rather than flag/env — only sample in batch using this pattern.

  - subject: mcp
    section: 3. Distribution
    samples_in_batch: 8
    sub_purposes_seen: {"every mechanism observed": 8, "published package name(s)": 8, "install commands shown in README": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Enumerates distribution channels (PyPI/uvx, npm/npx, Docker registries, Smithery, source clone), names the canonical published package, and quotes the README install one-liner.
    issues:
      - "When a server is not published to a package manager (PubMed, FuzzingLabs), this is signal — preserved as 'not published to PyPI at time of research' / 'no PyPI publishing'."

  - subject: mcp
    section: 4. Entry point / launch
    samples_in_batch: 8
    sub_purposes_seen: {"command(s) users/hosts run": 8, "wrapper scripts, launchers, stubs": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      The exact command users or MCP hosts invoke (uvx X / npx X / docker run X / python -m X) plus any wrapper layer (console-script entry, Dockerfile, Makefile, smithery.yaml).

  - subject: mcp
    section: 5. Configuration surface
    samples_in_batch: 8
    sub_purposes_seen: {"how config reaches the server": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      How configuration arrives at runtime — env vars, CLI flags, .env, JSON config files, host-injected env blocks, mounted credential files, optional per-tool enablement configs.

  - subject: mcp
    section: 6. Authentication
    samples_in_batch: 8
    sub_purposes_seen: {"flow": 8, "where credentials come from": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Auth mechanism (static API key/secret pair, connection-string credentials, OAuth, kubeconfig, none) and the channel that delivers credentials (env var, flag, mounted file, embedded in DSN). OAuth is rare across the batch.

  - subject: mcp
    section: 7. Multi-tenancy
    samples_in_batch: 8
    sub_purposes_seen: {"tenancy model": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Whether the server is single-user per process, single-connection per instance, or supports per-request tenant switching. Every sample in batch is single-user/single-connection; HTTP-transport variants explicitly note no per-request switching.
    issues:
      - "Source heading text was the long enumerated form ('single-user / per-request tenant / workspace-keyed / not applicable / other'); canonicalized to 'tenancy model'."

  - subject: mcp
    section: 8. Capabilities exposed
    samples_in_batch: 8
    sub_purposes_seen: {"tools / resources / prompts / sampling / roots / logging / other": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Inventory of MCP capability surface — tool count and grouping, presence of resources/prompts/sampling/roots/logging. Most samples expose tools only; one (ahmedmustahid) also exposes resources. Tool counts vary widely (5 in PubMed to 65+ in PagerDuty).

  - subject: mcp
    section: 9. Observability
    samples_in_batch: 8
    sub_purposes_seen: {"logging destination + format, metrics, tracing, debug flags": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Logging destination/format, metrics, tracing, debug flags. Frequently 'not surfaced' or 'not captured' across the batch — observability is poorly documented in MCP server READMEs as a class.
    issues:
      - "Across the batch, this section is the most frequently 'not surfaced' — suggests README authors do not foreground observability, or that the research phase deprioritized scraping it."

  - subject: mcp
    section: 10. Host integrations shown in README or repo
    samples_in_batch: 8
    sub_purposes_seen: {"Claude Desktop": 7, "Claude Code": 1, "Cursor": 4, "VS Code": 1, "PyCharm": 1, "Gemini CLI": 1, "Cline": 1, "Smithery": 1, "MCP Inspector": 1, "Other MCP-enabled clients": 1, "Other editors/CLIs": 2, "General MCP-compatible clients": 1, "pitfalls observed": 8}
    shape: open-enumeration
    common_description: |
      One ### per host the README documents. Claude Desktop is near-universal (7/8); Cursor common (4/8); long tail of Cline, Smithery, VS Code, PyCharm, Gemini CLI, MCP Inspector, generic catch-all entries.
    issues:
      - "Genuinely unbounded vocabulary — modeling as ### per host is correct but expect many more host names across the full corpus. Some samples used catch-all phrases ('Other editors/CLIs', 'General MCP-compatible clients') which are anti-information; consider canonicalizing to a single 'Other' bucket or omitting."

  - subject: mcp
    section: 11. Claude Code plugin wrapper
    samples_in_batch: 8
    sub_purposes_seen: {"presence and shape": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Whether the repo ships a `.claude-plugin/` directory or other Claude Code plugin wrapper. None of the 8 samples in this batch ship one — section is consistently 'not present' / 'not observed'.
    issues:
      - "Across the batch this section returns 'not present' for every sample. Worth flagging: the section may be doing little discriminative work and could fold into a presence-checklist instead of a full ### subsection."

  - subject: mcp
    section: 12. Tests
    samples_in_batch: 8
    sub_purposes_seen: {"presence, framework, location, notable patterns": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Whether tests exist, the framework (pytest, pytest-asyncio, vitest), location (tests/ vs co-located), and notable patterns (multi-layered suites, integration vs integrity tests). Often 'not surfaced within budget'.

  - subject: mcp
    section: 13. CI
    samples_in_batch: 8
    sub_purposes_seen: {"presence, system, triggers, what it runs": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Presence and system (predominantly GitHub Actions), triggers (PR, tag, schedule), and what jobs run (build, test, security scanning). Frequently 'present but specifics not extracted within budget'.

  - subject: mcp
    section: 14. Container / packaging artifacts
    samples_in_batch: 8
    sub_purposes_seen: {"Dockerfile, docker-compose, Helm, systemd, brew formula, etc.": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Inventory of container/packaging artifacts in the repo — Dockerfile is near-universal, docker-compose appears for multi-service, Helm/systemd/brew not seen in this batch.

  - subject: mcp
    section: 15. Example client / developer ergonomics
    samples_in_batch: 8
    sub_purposes_seen: {"MCP Inspector launcher, curl stubs, make targets, dev scripts, sample configs": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Developer-facing ergonomics — Makefiles, dev scripts, MCP Inspector launchers, sample host config snippets, lint/format toolchains, docs sites.

  - subject: mcp
    section: 16. Repo layout
    samples_in_batch: 8
    sub_purposes_seen: {"single-package / monorepo / vendored / other": 8, "pitfalls observed": 8}
    shape: closed-set
    common_description: |
      Top-level repo shape — single-package is dominant; one monorepo (FuzzingLabs, 38 servers); occasional 'mixed' (TS + pyproject.toml co-present in ahmedmustahid). Bare-script root layout (PubMed) is an antipattern flag.

  - subject: mcp
    section: 17. Notable structural choices
    samples_in_batch: 8
    shape: freeform
    common_description: |
      Freeform paragraph capturing distinctive design choices that don't fit elsewhere — tool-consolidation strategies, paper-mode-as-default, vendor vs community authorship, dev-tooling stack, distribution-channel mix. No fixed sub-purpose vocabulary; content varies per repo.
    issues:
      - "Source files often used bullet lists; consolidated to paragraph form per instructions. Some bullets bled into other sections' pitfalls in source — corrected during rewrite."

  - subject: mcp
    section: 18. Unanticipated axes observed
    samples_in_batch: 8
    shape: freeform
    common_description: |
      Freeform observations about decision dimensions or design axes the repo reveals that the canonical section list didn't anticipate — vendor-vs-community trust, paper-mode safety patterns, license unusualness, transport-specific concerns (CORS), bundled-tooling axes, supply-chain rigor.
    issues:
      - "Several sources prefixed entries with 'decision dimensions this repo reveals:' boilerplate — kept where it was the source's framing, since stripping it would lose the lens. Consider canonicalizing the framing."

  - subject: mcp
    section: 19. Python-specific
    samples_in_batch: 5
    sub_purposes_seen: {"SDK / framework variant": 5, "Python version floor": 5, "Packaging": 5, "Entry point": 5, "Install workflow expected of end users": 5, "Async and tool signatures": 5, "Type / schema strategy": 5, "Testing": 5, "Dev ergonomics": 5, "Notable Python-specific choices": 5}
    shape: closed-set
    common_description: |
      Python-only addendum capturing the SDK variant (raw mcp / FastMCP 1.x / FastMCP 2.x / custom), Python version floor, packaging backend + lock + version-manager convention, entry-point shape, install one-liner, async patterns, type/schema strategy, testing, dev tooling, and Python-specific design choices.
    outliers:
      - sample: alexei-led--k8s-mcp-server.md
        why: Python 3.13+ floor — unusually high for April 2026 MCP server work; primary entry is Docker not a Python console script.
      - sample: FuzzingLabs--mcp-security-hub.md
        why: Hand-rolled MCP impl, no unified pyproject; Python packaging deferred entirely to Docker layer per Dockerfile.
    issues:
      - "Three samples in the batch (GLips, HenkDz, ahmedmustahid) are TypeScript-majority and correctly omit section 19 — reinforces that 19 is conditionally present, gated on language."

  - subject: mcp
    section: 20. Gaps
    samples_in_batch: 8
    shape: freeform
    common_description: |
      Freeform paragraph (or short bullet list in source) listing what could not be determined within the research budget — typically last-commit dates, exact CI workflow content, schema/async details, observability mechanisms.
    issues:
      - "Content here heavily overlaps with 'pitfalls observed' subheadings in earlier sections that include 'what couldn't be determined' lists. Template might consolidate gaps into section 20 only and reserve 'pitfalls observed' for actual cautions/anti-patterns."
